<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping List</title>
    <link rel="icon" type="image/png" href="./favicon/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./styles/index.css">
</head>

<body>
    <header class="header">
        <hgroup>
            <h1>CSS Dinner Shopping List</h1>
            <p>Let’s go to the mall!</p>
        </hgroup>
    </header>
    <main>
        <ul class="shoppinglist">
            <li><label><input type="checkbox" name="dinnerlist" value="picklesalot"><span class="items">A lot of
                        pickles</span><span class="notes">for the next
                        lessons about CSS</span></label></li>
            <li><label><input type="checkbox" name="dinnerlist" value="apples10"><span class="items">10
                        apples</span><span class="notes">for more
                        CSS
                        manipulations</span></label></li>
            <li><label><input type="checkbox" name="dinnerlist" value="oranges20"><span class="items">20
                        oranges</span><span class="notes">because
                        they are
                        awesome</span></label></li>
            <li><label><input type="checkbox" name="dinnerlist" value="plates13"><span class="items">13
                        plates</span><span class="notes">hm...
                        they always
                        dissapear</span></label></li>
            <li><label><input type="checkbox" name="dinnerlist" value="bentos15"><span class="items">15
                        bentos</span></label></li>
            <li><label><input type="checkbox" name="dinnerlist" value="sake1"><span class="items">1 bottle of
                        Sake</span><span class="notes">for
                        my
                        friends</span></label>
            </li>
        </ul>
    </main>
    <div id="button"><button type="button">Bon appetit :)</button></div>
</body>

</html>
