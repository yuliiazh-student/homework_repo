<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Fortcast</title>
    <link rel="stylesheet" href="./assets/index.css">
    <link rel="stylesheet" href="./assets/css/weather-icons.min.css">
</head>

<body>
    <div class="container">
        <main>
            <h1>CSS Weather Forecast <i class="wi wi-sunrise"></i></h1>
            <ul class="cities">
                <li>
                    <div>Lisbon</div>
                    <div>21°C <i class="wi wi-day-sunny"></i></div>
                </li>
                <li>Paris 11°C <i class="wi wi-night-showers"></i></li>
                <li>Belgrade 15°C <i class="wi wi-day-cloudy"></i></li>
                <li>Venice 21°C <i class="wi wi-day-cloudy-high"></i></li>
                <li>Tel-Avive 32°C <i class="wi wi-hot"></i></li>
                <li>Cair 21°C <i class="wi wi-day-sunny"></i></li>
                <li>New-York 17°C <i class="wi wi-day-thunderstorm"></i></li>
                <li>New-Delhi 17°C <i class="wi wi-rain-wind"></i></li>
                <li>San-Francisco 15°C <i class="wi wi-day-sunny-overcast"></i></li>
                <li>Tokyo 8°C <i class="wi wi-night-clear"></i></li>
                <li>Sydney 25°C <i class="wi wi-night-partly-cloudy"></i></li>
            </ul>
            <p>Have a nice day and don't forget umbrella if you are in New Delhi now!</p>
        </main>
    </div>
</body>

</html>
