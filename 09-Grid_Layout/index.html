<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photography</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Delius+Unicase&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./index.css">
</head>

<body>
    <div class="page-wrapper">
        <main>
            <div class="container">
                <section>
                    <h2>Architectural Photography</h2>
                    <div class="cities-grid">
                        <img src="./assets/cities/1.webp" alt="Tokyo">
                        <img src="./assets/cities/2.webp" alt="Manchester" class="large-horizontal">
                        <img src="./assets/cities/3.webp" alt="Seville" class="large-horizontal">
                        <img src="./assets/cities/4.webp" alt="Milan">
                        <img src="./assets/cities/5.webp" alt="San Francisco">
                        <img src="./assets/cities/6.webp" alt="New York City" class="large-horizontal">
                    </div>
                </section>
                <section>
                    <h2>Still Life Photography</h2>
                    <div class="nature-grid">
                        <img src="./assets/nature/1.webp" alt="Waterfall">
                        <img src="./assets/nature/2.webp" alt="Beach" class="large-horizontal">
                        <img src="./assets/nature/3.webp" alt="Desert rocks" class="huge-photo">
                        <img src="./assets/nature/4.webp" alt="Sunset on the lake" class="large-vertical">
                        <img src="./assets/nature/5.webp" alt="Lavender field" class="large-horizontal">
                        <img src="./assets/nature/6.webp" alt="Forest">
                    </div>
                </section>
                <section>
                    <h2>Portrait and Fashion Photography</h2>
                    <div class="people-grid">
                        <img src="./assets/people/1.webp" alt="Girl in the dress">
                        <img src="./assets/people/2.webp" alt="Girl in the sportswear" class="large-vertical">
                        <img src="./assets/people/3.webp" alt="Man with beard">
                        <img src="./assets/people/4.webp" alt="Profile of the curly girl">
                        <img src="./assets/people/5.webp" alt="Girl with some oranges" class="large-vertical">
                        <img src="./assets/people/6.webp" alt="Girl in the glasses" class="large-vertical">
                        <img src="./assets/people/7.webp" alt="Man in the glasses">
                        <img src="./assets/people/8.webp" alt="Four friends" class="large-horizontal">
                        <img src="./assets/people/9.webp" alt="Curly man" class="large-horizontal">
                        <img src="./assets/people/10.webp" alt="Couple in love">
                    </div>
                </section>
            </div>
        </main>
    </div>
</body>

</html>
